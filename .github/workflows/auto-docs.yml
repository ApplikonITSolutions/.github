name: Auto Documentation

"on":
  workflow_dispatch:
    inputs:
      description:
        description: 'Brief description of changes in this release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Get recent changes
        run: |
          git log --oneline -10 > recent_commits.txt
          git diff HEAD~5 HEAD --name-only > changed_files.txt
          git diff HEAD~5 HEAD > code_diff.txt
          echo "=== Recent Commits ==="
          cat recent_commits.txt
          echo "=== Changed Files ==="
          cat changed_files.txt

      - name: Generate documentation with Claude
        run: python3 scripts/generate_docs.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_DESCRIPTION: ${{ github.event.inputs.description }}

      - name: Push docs to central docs repo
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          TOKEN="${{ secrets.DOCS_REPO_TOKEN }}"
          
          echo "=== Debug: Testing token ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/ApplikonITSolutions/docs"
          
          echo "=== Cloning docs repo ==="
          git clone "https://oauth2:${TOKEN}@github.com/ApplikonITSolutions/docs.git" central-docs
          
          mkdir -p central-docs/$REPO_NAME/changes
          cp docs/CHANGELOG.md central-docs/$REPO_NAME/CHANGELOG.md 2>/dev/null || true
          cp -r docs/changes/. central-docs/$REPO_NAME/changes/ 2>/dev/null || true
          cd central-docs
          python3 ../update_dashboard.py 2>/dev/null || true
          git config user.name "Claude Docs Bot"
          git config user.email "claude-bot@applikonit.com"
          git add .
          git diff --staged --quiet && echo "No changes" || git commit -m "docs($REPO_NAME): auto-generated [skip ci]"
          git push "https://oauth2:${TOKEN}@github.com/ApplikonITSolutions/docs.git" main
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
